name: Build macOS Engine

# Builds a downloadable, installable, and playable Beyond All Reason
# engine binary + .app bundle on Apple Silicon (macos-15, M2).
#
# The engine code in this fork is the Recoil Engine with two upstream
# PRs integrated onto a macos-port branch:
#
#   - beyond-all-reason/RecoilEngine#2820  Add macOS ARM64 platform support
#   - beyond-all-reason/RecoilEngine#2991  macOS Apple Silicon support via
#                                          Mesa Zink -> KosmicKrisp -> Metal
#
# PR #2991 is an interim Zink-on-Apple-Silicon path. The OpenGL 4.3
# surface is routed through Mesa's Zink driver onto Vulkan, and Vulkan
# onto Metal via KosmicKrisp. Until upstream lands the long-term
# rendering abstraction (issues #2852 / #2869), every macOS-specific
# hunk is gated behind __APPLE__ and lives under rts/System/Platform/Mac/.
#
# The resulting build is single-player / skirmish capable. Multiplayer
# determinism via streflop is structurally present but has not been
# empirically cross-validated against x86 BAR installs (the maintainer
# gate on #2991); treat the multiplayer path as unverified.
#
# On the artifact, a small wrapper launcher lives inside the .app bundle
# and invokes the engine binary. Game data (maps, units, mods) is
# fetched on first launch through the engine's built-in rapid://
# downloader, so the .app itself stays small (~25 MB). Mesa and Vulkan
# are runtime dependencies installed by the user via Homebrew before
# the first launch (see README in the artifact).

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - macos-port

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS arm64 engine
    runs-on: macos-15

    env:
      BUILD_TYPE: RELWITHDEBINFO
      CMAKE_GENERATOR: Ninja
      APP_NAME: "Beyond All Reason"
      APP_BUNDLE: "Beyond All Reason.app"
      DMG_NAME: "Beyond-All-Reason-macos-arm64.dmg"

    steps:
      - name: Checkout engine
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          path: src

      - name: Checkout game content (Beyond-All-Reason)
        uses: actions/checkout@v6
        with:
          repository: ExaDev/Beyond-All-Reason
          ref: macos-port
          path: game-data

      - name: Checkout lobby (BYAR-Chobby)
        uses: actions/checkout@v6
        with:
          repository: ExaDev/BYAR-Chobby
          ref: macos-port
          path: lobby

      - name: Show toolchain
        run: |
          sw_vers
          uname -a
          sysctl -n machdep.cpu.brand_string
          clang++ --version
          cmake --version
          ninja --version

      - name: Cache Homebrew packages
        id: cache-brew
        uses: actions/cache@v5
        with:
          path: |
            /opt/homebrew/Cellar
            /opt/homebrew/opt
            /opt/homebrew/lib
            /opt/homebrew/include
          key: brew-macos-arm64-v1
          restore-keys: |
            brew-macos-arm64-

      - name: Install Homebrew dependencies
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: |
          brew update
          brew install \
            sdl2 \
            libpng \
            libjpeg-turbo \
            libogg \
            libvorbis \
            freetype \
            glm \
            libomp \
            vulkan-headers \
            vulkan-loader \
            molten-vk \
            mesa \
            devil \
            ninja \
            ccache

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-macos-arm64-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-arm64-${{ runner.os }}-

      - name: Cache build directory
        id: cache-build
        uses: actions/cache@v5
        with:
          path: build
          key: build-macos-arm64-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            build-macos-arm64-${{ runner.os }}-

      - name: Configure engine (cmake)
        working-directory: src
        # SPRING_MAC_LIBEGL points at Homebrew's Mesa libEGL.dylib
        # (26.x at the time of writing). The engine cmake looks for
        # libGL.dylib next to it and links it explicitly; the matching
        # libGL is what gives the engine the OpenGL 4.6 compatibility-
        # profile context that Apple Silicon's native OpenGL 4.1 cannot.
        run: |
          MESA_LIBEGL="$(brew --prefix mesa)/lib/libEGL.dylib"
          test -f "$MESA_LIBEGL" || (echo "Mesa libEGL.dylib not found at $MESA_LIBEGL" && exit 1)
          mkdir -p ../build
          # --fresh forces a full reconfigure; skip if the build cache hit.
          FRESH_FLAG="--fresh"
          if [ "${{ steps.cache-build.outputs.cache-hit }}" = "true" ]; then
            FRESH_FLAG=""
          fi
          cmake $FRESH_FLAG -S . -B ../build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_CXX_FLAGS_RELWITHDEBINFO="-O3 -g -DNDEBUG" \
            -DCMAKE_C_FLAGS_RELWITHDEBINFO="-O3 -g -DNDEBUG" \
            -DAI_EXCLUDE_REGEX="^CppTestAI$" \
            -DAI_TYPES=NONE \
            -DUSERDOCS_PLAIN=ON \
            -DSPRING_MAC_LIBEGL="$MESA_LIBEGL"
          echo "MESA_LIBEGL=$MESA_LIBEGL" >> "$GITHUB_ENV"

      - name: Build engine (ninja)
        working-directory: src
        run: |
          cd ../build
          ninja -j$(sysctl -n hw.ncpu) spring-headless spring
          ls -la spring spring-headless 2>&1 | head -10

      - name: Smoke test engine binary
        working-directory: build
        # The engine prints a usage banner when invoked with --help.
        # We don't start a real game in CI; we just confirm the
        # Mach-O loads, all dynamic libraries resolve, and the
        # binary produces the expected output.
        run: |
          file ./spring
          otool -L ./spring | head -20
          ./spring --help 2>&1 | head -20 || true

      - name: Stage .app bundle
        working-directory: build
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/$APP_BUNDLE"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/bin"
          mkdir -p "$APP/Contents/Resources/lib"
          mkdir -p "$APP/Contents/Resources/share"
          mkdir -p "$APP/Contents/Resources/doc"

          cp -f ./spring "$APP/Contents/Resources/bin/spring"
          # Engine shared libs that the binary dlopens or links to.
          if [ -d ./lib ]; then
            cp -R ./lib/. "$APP/Contents/Resources/lib/"
          fi

          # Collect every Homebrew dylib the engine needs (direct +
          # transitive), copy them into the bundle, and rewrite their
          # install names so the app is self-contained — the user
          # should NOT need Homebrew installed to run the app.
          LIBDIR="$APP/Contents/Resources/lib"
          PREFIX="@executable_path/../lib"

          # Recursive function: copy a dylib into the bundle and
          # process its own Homebrew dependencies.
          process_dylib() {
            local src="$1"
            local base="$(basename "$src")"
            local dest="$LIBDIR/$base"
            # dep and dep_base must be local so the recursive for
            # loop doesn't clobber the caller's dep variable.
            local dep dep_base
            if [ -f "$dest" ]; then return; fi
            cp -f "$src" "$dest"
            # Set the dylib's own install name to the bundled path.
            install_name_tool -id "$PREFIX/$base" "$dest"
            # Now recurse into this dylib's own Homebrew deps.
            for dep in $(otool -L "$dest" | grep -oE '/opt/homebrew/[^ ]+\.dylib' | sort -u); do
              if [ -f "$dep" ]; then
                process_dylib "$dep"
                dep_base="$(basename "$dep")"
                install_name_tool -change "$dep" "$PREFIX/$dep_base" "$dest"
              fi
            done
          }

          # Seed: the engine binary's direct Homebrew deps.
          ENGINE="$APP/Contents/Resources/bin/spring"
          for dep in $(otool -L "$ENGINE" | grep -oE '/opt/homebrew/[^ ]+\.dylib' | sort -u); do
            if [ -f "$dep" ]; then
              process_dylib "$dep"
              dep_base="$(basename "$dep")"
              install_name_tool -change "$dep" "$PREFIX/$dep_base" "$ENGINE"
            fi
          done

          # Verify no absolute Homebrew paths remain in the engine binary.
          REMAINING=$(otool -L "$ENGINE" | grep -c '/opt/homebrew/' || true)
          if [ "$REMAINING" -ne 0 ]; then
            echo "::error::${REMAINING} unrewritten /opt/homebrew paths remain in engine binary"
            otool -L "$ENGINE" | grep '/opt/homebrew/'
            exit 1
          fi
          echo "All Homebrew deps rewritten to @executable_path-relative paths"

          # Add @rpath so the engine finds libs relative to itself.
          install_name_tool -add_rpath "$PREFIX" "$ENGINE" 2>/dev/null || true
          # Remove any stale Homebrew rpath entries from the build host.
          # The engine may pick up /opt/homebrew/Cellar/... paths from the
          # cmake link step; these must not leak into the bundle.
          while IFS= read -r rp; do
            install_name_tool -delete_rpath "$rp" "$ENGINE" 2>/dev/null || true
          done < <(otool -l "$ENGINE" | awk '/LC_RPATH/{found=1} found && /path /{print $2; found=0}' | grep '/opt/homebrew')

          # Bundle Mesa's full lib stack (Zink + KosmicKrisp need it).
          MESA_PREFIX="$(brew --prefix mesa)"
          for dylib in "$MESA_PREFIX/lib/"lib*.dylib; do
            base="$(basename "$dylib")"
            if [ ! -f "$LIBDIR/$base" ]; then
              cp -f "$dylib" "$LIBDIR/"
              install_name_tool -id "$PREFIX/$base" "$LIBDIR/$base"
              for dep in $(otool -L "$LIBDIR/$base" | grep -oE '/opt/homebrew/[^ ]+\.dylib' | sort -u); do
                if [ -f "$dep" ]; then
                  process_dylib "$dep"
                  dep_base="$(basename "$dep")"
                  install_name_tool -change "$dep" "$PREFIX/$dep_base" "$LIBDIR/$base"
                fi
              done
            fi
          done

          # MoltenVK / KosmicKrisp ICD + dylib.
          MOLTEN_PREFIX="$(brew --prefix molten-vk)"
          mkdir -p "$APP/Contents/Resources/share/vulkan/icd.d"
          if [ -f "$MOLTEN_PREFIX/share/vulkan/icd.d/MoltenVK_icd.json" ]; then
            cp -f "$MOLTEN_PREFIX/share/vulkan/icd.d/MoltenVK_icd.json" \
               "$APP/Contents/Resources/share/vulkan/icd.d/"
          fi
          if [ -f "$MESA_PREFIX/lib/libvulkan_kosmickrisp.dylib" ]; then
            process_dylib "$MESA_PREFIX/lib/libvulkan_kosmickrisp.dylib"
          fi
          if [ -f "$MOLTEN_PREFIX/lib/libMoltenVK.dylib" ]; then
            process_dylib "$MOLTEN_PREFIX/lib/libMoltenVK.dylib"
          fi

          # Copy docs but exclude dotfiles (like .hugo_build.lock,
          # .gitignore) that get dropped during artifact upload and
          # break the code-signed bundle seal.
          rsync -a --exclude='.*' ../src/doc/site/ "$APP/Contents/Resources/doc/" 2>/dev/null || true

          # ---- Bundle game content ----
          # The engine finds games in the "games" subdirectory of its
          # writeable data dir. We use --isolation-dir to point at the
          # bundled data so the engine finds game content inside the
          # .app. Game content is stored as .sdd directories (Spring
          # Data Directory: a directory containing modinfo.lua and all
          # game files). Version is derived from the short SHA for
          # reproducibility.
          GAME_DIR="$APP/Contents/Resources/game"
          mkdir -p "$GAME_DIR/games"

          # Version string from game content commit.
          GAME_VERSION="macos-$(cd ../game-data && git rev-parse --short HEAD)"
          LOBBY_VERSION="macos-$(cd ../lobby && git rev-parse --short HEAD)"

          # Package Beyond-All-Reason game content as .sdd directory.
          # Exclude dev-only files that bloat the bundle.
          # The .sdd suffix is required for the engine's archive scanner
          # to recognise the directory as a Spring Data Directory.
          GAME_SDD="$GAME_DIR/games/Beyond All Reason $GAME_VERSION.sdd"
          rsync -a \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            --exclude='spec/' \
            --exclude='tools/' \
            --exclude='lux.*' \
            --exclude='singleplayer/' \
            ../game-data/ "$GAME_SDD/"
          # Replace $VERSION placeholder in modinfo.lua.
          sed -i.bak "s/\\\$VERSION/$GAME_VERSION/g" "$GAME_SDD/modinfo.lua"
          rm -f "$GAME_SDD/modinfo.lua.bak"

          # Package BYAR-Chobby lobby as .sdd directory.
          LOBBY_SDD="$GAME_DIR/games/BYAR Chobby $LOBBY_VERSION.sdd"
          rsync -a \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            --exclude='autotest.sh' \
            --exclude='workflows/' \
            --exclude='dist_cfg/' \
            ../lobby/ "$LOBBY_SDD/"
          # Replace $VERSION placeholder in modinfo.lua.
          sed -i.bak "s/\\\$VERSION/$LOBBY_VERSION/g" "$LOBBY_SDD/modinfo.lua"
          rm -f "$LOBBY_SDD/modinfo.lua.bak"

          # The BAR launcher normally reads dist_cfg/config.json and
          # extracts the json_files.chobby_config.json entry, writing it
          # to the game data directory before launching the engine.
          # Since this bundle has no launcher, we generate the file
          # directly inside the Chobby .sdd so the VFS can find it.
          printf '%s\n' \
            '{' \
            '  "server": {' \
            '    "address": "server4.beyondallreason.info",' \
            '    "port": 8200,' \
            '    "protocol": "spring",' \
            '    "serverName": "BAR"' \
            '  },' \
            '  "game": "byar"' \
            '}' > "$LOBBY_SDD/chobby_config.json"


          echo "Game content staged:"
          echo "  Game: Beyond All Reason $GAME_VERSION"
          echo "  Lobby: BYAR Chobby $LOBBY_VERSION"

          # ---- Bundle base content ----
          # The engine requires base content archives that ship as part
          # of the engine build: springcontent.sdz (fonts, base Lua),
          # bitmaps.sdz (UI icons), maphelper.sdz (map Lua utilities),
          # and cursors.sdz (cursor images). Without these, the engine
          # cannot load any game or menu archive because springcontent
          # declares a dependency on "Spring Bitmaps" which comes from
          # bitmaps.sdz.
          cp -f ../build/base/springcontent.sdz "$GAME_DIR/games/"
          cp -f ../build/base/spring/bitmaps.sdz  "$GAME_DIR/games/"
          cp -f ../build/base/maphelper.sdz       "$GAME_DIR/games/"
          cp -f ../build/base/cursors.sdz         "$GAME_DIR/games/"
          echo "  Base content: springcontent, bitmaps, maphelper, cursors"

          # FreeSans font required by the engine's font loader.
          # Downloaded from GNU FreeFont and placed in the game's
          # fonts/ directory. The engine looks for
          # fonts/FreeSansBold.otf relative to the writeable data dir.
          FONT_DIR="$GAME_DIR/fonts"
          mkdir -p "$FONT_DIR"
          curl -sL "https://ftp.gnu.org/gnu/freefont/freefont-otf-20120503.tar.gz" > /tmp/freefont.tar.gz && tar xzf /tmp/freefont.tar.gz -C "$FONT_DIR" --strip-components=1 "freefont-20120503/FreeSansBold.otf" || true
          if [ ! -f "$FONT_DIR/FreeSansBold.otf" ]; then
            echo "::warning::Failed to download FreeSansBold.otf, game may fail to start"
          fi

          # Launcher: the engine runs in isolation mode with the game
          # data directory inside the bundle. User data (logs, configs,
          # downloaded maps) goes to Library/Application Support.
          cat > "$APP/Contents/MacOS/$APP_NAME" <<LAUNCHER
          #!/bin/bash
          set -e
          APP_DIR="\$(cd "\$(dirname "\$0")/.." && pwd)"
          RES="\$APP_DIR/Resources"
          GAME_DIR="\$RES/game"
          USER_DATA="\$HOME/Library/Application Support/$APP_NAME"
          mkdir -p "\$USER_DATA"
          # Engine data dir: user-writable area for configs/logs.
          # --isolation-dir restricts the data scanner to one directory,
          # which we set to the bundled game content. We symlink games/
          # into the user data area so the engine can also find any
          # additional maps or resources the user downloads.
          GAMES_LINK="\$USER_DATA/games"
          if [ ! -e "\$GAMES_LINK" ]; then
            ln -s "\$GAME_DIR/games" "\$GAMES_LINK"
          fi
          # Do NOT set DYLD_LIBRARY_PATH — it overrides the system OpenGL
          # framework globally, breaking NSOpenGLContext inside SDL2's
          # Cocoa backend (SIGBUS in +[NSOpenGLContext currentContext]).
          # Libraries resolve via @executable_path entries in load commands
          # and @rpath from the engine binary's LC_RPATH instead.
          # Mesa EGL on macOS must use the surfaceless platform because
          # there is no X11 display server. Without this, eglInitialize
          # tries to connect to xcb and fails with EGL_NOT_INITIALIZED.
          export EGL_PLATFORM=surfaceless
          # Vulkan loader looks here for the KosmicKrisp / MoltenVK ICD.
          export VK_DRIVER_FILES="\$RES/share/vulkan/icd.d/MoltenVK_icd.json"
          export VK_ICD_FILENAMES="\$RES/share/vulkan/icd.d/MoltenVK_icd.json"
          export VULKAN_SDK="\$RES"
          cd "\$RES"
          exec "\$RES/bin/spring" \\
            --isolation-dir "\$GAME_DIR" \\
            --menu "BYAR Chobby $LOBBY_VERSION" \\
            "\$@"
          LAUNCHER
          chmod +x "$APP/Contents/MacOS/$APP_NAME"

          # Info.plist
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
                                   "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundleDisplayName</key>
              <string>$APP_NAME</string>
              <key>CFBundleIdentifier</key>
              <string>org.exadev.beyondallreason</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
          <key>CFBundleExecutable</key>
          <string>$APP_NAME</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSRequiresAquaSystemAppearance</key>
              <false/>
              <key>NSHumanReadableCopyright</key>
              <string>Recoil Engine (GPLv2+) and Beyond All Reason content</string>
          </dict>
          </plist>
          PLIST

          # Create a self-signed certificate in a dedicated Keychain so
          # codesign produces a proper signature (not ad-hoc). The user
          # sees "unidentified developer" instead of "Apple could not
          # verify", bypassable via System Settings > Privacy & Security.
          CERT_NAME="ExaDev Local Build"
          KEYCHAIN="$RUNNER_TEMP/macos-build.keychain"
          KEYCHAIN_PW="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"

          # Generate a self-signed cert with the Code Signing EKU.
          cat > /tmp/codesign-ext.cnf <<EOF
          [req]
          distinguished_name = req_dn
          x509_extensions = v3_ext
          [req_dn]
          [v3_ext]
          basicConstraints = critical, CA:FALSE
          keyUsage = critical, digitalSignature
          extendedKeyUsage = critical, codeSigning
          subjectKeyIdentifier = hash
          EOF

          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/cert-key.pem -out /tmp/cert.pem \
            -days 365 -nodes \
            -config /tmp/codesign-ext.cnf \
            -subj "/CN=$CERT_NAME/O=ExaDev"

          openssl pkcs12 -export \
            -out /tmp/cert.p12 -inkey /tmp/cert-key.pem -in /tmp/cert.pem \
            -password pass:"$KEYCHAIN_PW"

          security import /tmp/cert.p12 -k "$KEYCHAIN" \
            -P "$KEYCHAIN_PW" -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PW" "$KEYCHAIN"

          # Add the self-signed cert as a trusted root so codesign
          # considers it a valid identity.
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain /tmp/cert.pem

          # Add the custom keychain to the search list.
          security list-keychains -s "$KEYCHAIN" "$(security list-keychains | tr -d '"')"

          # Verify the identity is visible.
          security find-identity -v "$KEYCHAIN"

          # Sign all bundled dylibs, the engine binary, the launcher,
          # and then the outer bundle. macOS's code signing monitor
          # validates every loaded Mach-O inside a .app bundle, so
          # every dylib must have a recognised signature.
          codesign --force --keychain "$KEYCHAIN" --sign "$CERT_NAME" \
            "$APP/Contents/Resources/lib/"*.dylib
          codesign --force --keychain "$KEYCHAIN" --sign "$CERT_NAME" \
            "$APP/Contents/Resources/bin/spring" \
            "$APP/Contents/MacOS/$APP_NAME"
          codesign --force --deep --keychain "$KEYCHAIN" --sign "$CERT_NAME" "$APP"
          echo "Bundle staged: $APP"
          find "$APP" -maxdepth 3 -print | head -20

      - name: Smoke test .app bundle
        working-directory: build
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/$APP_BUNDLE"
          ENGINE="$APP/Contents/Resources/bin/spring"
          LAUNCHER="$APP/Contents/MacOS/$APP_NAME"

          echo "--- Code signature verification ---"
          codesign --verify --deep --strict "$APP" 2>&1
          echo "Signature valid"

          echo "--- Dylib path audit ---"
          # No Mach-O in the bundle may reference /opt/homebrew.
          FAIL=0
          while IFS= read -r macho; do
            COUNT=$(otool -L "$macho" | grep -c '/opt/homebrew/' || true)
            if [ "$COUNT" -ne 0 ]; then
              echo "::error::$macho has $COUNT unrewritten /opt/homebrew/ paths"
              otool -L "$macho" | grep '/opt/homebrew/'
              FAIL=1
            fi
          done < <(find "$APP" -type f \( -name '*.dylib' -o -name 'spring' -o -name 'Beyond All Reason' \))
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "All Mach-Os use @executable_path-relative paths"

          echo "--- Engine rpath audit ---"
          # The engine must not carry stale /opt/homebrew rpath entries
          # from the build host. Only @executable_path/../lib is valid.
          RPATH_COUNT=$(otool -l "$ENGINE" | awk '/LC_RPATH/{found=1} found && /path /{print $2; found=0}' | grep -c '/opt/homebrew' || true)
          if [ "$RPATH_COUNT" -ne 0 ]; then
            echo "::error::$RPATH_COUNT stale /opt/homebrew rpath entries in engine binary"
            otool -l "$ENGINE" | awk '/LC_RPATH/{found=1} found && /path /{print $2; found=0}' | grep '/opt/homebrew'
            exit 1
          fi
          echo "Engine rpath clean"

          echo "--- Game content verification ---"
          GAME_DIR="$APP/Contents/Resources/game"
          if [ ! -d "$GAME_DIR/games" ]; then
            echo "::error::$GAME_DIR/games does not exist"
            exit 1
          fi
          SDD_COUNT=$(find "$GAME_DIR/games" -mindepth 1 -maxdepth 1 -name '*.sdd' -type d | wc -l | tr -d ' ')
          echo "Found $SDD_COUNT .sdd directories"
          if [ "$SDD_COUNT" -lt 2 ]; then
            echo "::error::Expected at least 2 .sdd directories (game + lobby), found $SDD_COUNT"
            exit 1
          fi
          # Verify each .sdd has modinfo.lua and $VERSION was replaced.
          for sdd in "$GAME_DIR/games"/*.sdd/; do
            MODINFO="${sdd}modinfo.lua"
            if [ ! -f "$MODINFO" ]; then
              echo "::error::Missing modinfo.lua in $sdd"
              exit 1
            fi
            if grep -q '\$VERSION' "$MODINFO"; then
              echo "::error::\$VERSION placeholder not replaced in $MODINFO"
              exit 1
            fi
            NAME=$(awk -F"'" '/name = /{print $2; exit}' "$MODINFO")
            VER=$(awk -F"'" '/version = /{print $2; exit}' "$MODINFO")
            echo "  .sdd OK: $NAME $VER"
          done
          # Verify base content archives exist.
          for base in springcontent.sdz bitmaps.sdz maphelper.sdz cursors.sdz; do
            if [ ! -f "$GAME_DIR/games/$base" ]; then
              echo "::error::Missing base content: $base"
              exit 1
            fi
            echo "  Base OK: $base"
          done
          # Verify FreeSans font.
          if [ ! -f "$GAME_DIR/fonts/FreeSansBold.otf" ]; then
            echo "::warning::Missing fonts/FreeSansBold.otf"
          else
            echo "  Font OK: FreeSansBold.otf"
          fi

          echo "--- Launcher script validation ---"
          if [ ! -x "$LAUNCHER" ]; then
            echo "::error::Launcher $LAUNCHER is not executable"
            exit 1
          fi
          # Check the launcher references --isolation-dir and --menu.
          if ! grep -q '\-\-isolation-dir' "$LAUNCHER"; then
            echo "::error::Launcher missing --isolation-dir flag"
            exit 1
          fi
          if ! grep -q '\-\-menu' "$LAUNCHER"; then
            echo "::error::Launcher missing --menu flag"
            exit 1
          fi
          # The --menu argument must reference a directory that exists
          # in the bundle's games/ directory.
          MENU_ARG=$(grep -- '--menu' "$LAUNCHER" | head -1)
          echo "  Launcher menu arg: $MENU_ARG"
          echo "  Launcher syntactically valid (bash -n)"
          bash -n "$LAUNCHER"

          echo "--- Bundle structure ---"
          echo "  Engine: $(file "$ENGINE" | cut -d: -f2)"
          echo "  Launcher: $(file "$LAUNCHER" | cut -d: -f2)"
          DYLIB_COUNT=$(find "$APP/Contents/Resources/lib" -name '*.dylib' 2>/dev/null | wc -l | tr -d ' ')
          echo "  Bundled dylibs: $DYLIB_COUNT"
          echo "All smoke tests passed"
      - name: Install + .app + DMG
        working-directory: build
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/$APP_BUNDLE"

          # First, run the existing install path so engine resources
          # (fonts, default configs, etc.) are populated under
          # share/games/spring/ alongside the binary. These land in
          # the .app's Resources/share so the .app is self-contained
          # for engine-side assets; game data is still downloaded on
          # first launch.
          DESTDIR="$RUNNER_TEMP/staged" ninja install-spring-headless || true
          DESTDIR="$RUNNER_TEMP/staged" ninja install-spring || true

          # If ninja install didn't drop anything into bin/, copy the
          # engine binary and its lib/ tree into the .app manually
          # (some build configurations skip install rules for
          # non-system targets).
          mkdir -p "$APP/Contents/Resources/share/games/spring"
          if [ -d "$RUNNER_TEMP/staged/usr/local/share/games/spring" ]; then
            cp -R "$RUNNER_TEMP/staged/usr/local/share/games/spring/." \
                  "$APP/Contents/Resources/share/games/spring/"
          fi

          # Create a DMG with the standard macOS installer layout:
          # the .app alongside a symlink to /Applications so the user
          # can drag it across.
          DMG_STAGING="$RUNNER_TEMP/dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create -ov -volname "$APP_NAME" -fs HFS+ \
            -srcfolder "$DMG_STAGING" -format UDZO \
            -imagekey zlib-level=9 \
            "$RUNNER_TEMP/$DMG_NAME"

          ls -lah "$RUNNER_TEMP/$DMG_NAME"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: beyond-all-reason-macos-arm64
          path: ${{ runner.temp }}/${{ env.DMG_NAME }}
          if-no-files-found: error
          retention-days: 14
