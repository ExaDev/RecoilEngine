# Runs the Beyond All Reason "fightertest" sync tests against an engine commit.
#
# This workflow does NOT build the engine. It looks up the most recent
# successful "Build Engine v2" run for the target commit and downloads its
# amd64-linux artifact. If no such run exists, the workflow fails fast.
#
# Four fightertest scenarios (bots, tanks, aircraft, pathfinding) run in
# parallel on separate workers via a matrix strategy.
#
# See test/fightertest/README.md for background and how to run locally.
name: Fightertest sync test

# TODO: eventually have this trigger after every mainline commit and in PRs. Probably as a workflow triggered once engine build is complete.
on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Engine commit SHA to test. Leave blank to test the head of the ref selected in the picker above.'
        type: string
        default: ''

permissions:
  # actions:read is required to list workflow runs and download artifacts
  # produced by a different workflow run (the Build Engine v2 run for the
  # target commit).
  actions: read
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      run_id: ${{ steps.engine-run.outputs.run_id }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve target commit
        id: resolve
        run: |
          set -euo pipefail
          target="${{ inputs.commit }}"
          if [ -z "$target" ]; then target="${{ github.sha }}"; fi

          # Normalize whatever the user pasted (full sha, short sha, branch, tag)
          # into a full 40-char SHA so the run lookup below is unambiguous.
          full_sha=$(gh api "repos/${{ github.repository }}/commits/$target" --jq '.sha')
          echo "Resolved target commit: $full_sha"
          echo "sha=$full_sha" >> "$GITHUB_OUTPUT"

      - name: Find Build Engine v2 run for this commit
        id: engine-run
        run: |
          set -euo pipefail
          run_id=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/engine-build.yml/runs?head_sha=${{ steps.resolve.outputs.sha }}&status=success" \
            --jq '.workflow_runs[0].id')
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "::error::No successful 'Build Engine v2' run found for commit ${{ steps.resolve.outputs.sha }}."
            echo "::error::Trigger Build Engine v2 on that commit first (push it, or dispatch engine-build.yml manually) and retry."
            exit 1
          fi
          echo "Using engine-build run $run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

  fightertest:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: bots
            startscript: test/fightertest/bots-startscript.txt
            map: "Starwatcher 1.0"
          - test: tanks
            startscript: test/fightertest/tanks-startscript.txt
            map: "Starwatcher 1.0"
          - test: aircraft
            startscript: test/fightertest/aircraft-startscript.txt
            map: "Starwatcher 1.0"
          - test: pathfinding
            startscript: test/fightertest/pathfinding-startscript.txt
            map: "Jade Empress 1.3"
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout workflow definition and test inputs
        # Uses the ref picked in the dispatch UI (github.sha), NOT the target
        # commit — so the startscripts and any other test assets come from the
        # workflow-definition ref. The target commit only controls which engine
        # artifact gets downloaded below.
        uses: actions/checkout@v4

      # TODO: matrix this to test (+ compare) multiple platforms sync hashes.
      - name: Download engine artifact
        uses: actions/download-artifact@v4
        with:
          pattern: engine-artifacts-amd64-linux*
          run-id: ${{ needs.setup.outputs.run_id }}
          github-token: ${{ github.token }}
          path: engine-artifact
          merge-multiple: true

      - name: Extract install tree
        run: |
          set -euo pipefail
          mkdir -p install

          # Engine is packaged with INSTALL_PORTABLE=ON (CMake default, see
          # CMakeLists.txt:22), so binaries live at the install-tree root:
          #   install/spring-headless, install/pr-downloader, install/spring, ...
          # engine-build also uploads a -dbgsym.tar.zst alongside the 7z; the
          # glob below intentionally matches only the .7z.
          7z x engine-artifact/recoil_*_amd64-linux*.7z -oinstall
          chmod +x install/spring-headless install/pr-downloader

      - name: Restore bar-data cache
        uses: actions/cache@v4
        with:
          path: bar-data
          # IMPORTANT:
          # Bump this key in lockstep with any change to the pinned
          # gametype/mapname in the startscripts. See test/fightertest/README.md.
          # The map slug is part of the key so tests using different maps get
          # separate caches (bots/tanks/aircraft share Starwatcher, pathfinding
          # has its own for Jade Empress).
          key: bar-data-byar-test-29660-e79286c-${{ matrix.map }}

      - name: Fetch pinned BAR assets (no-op on warm cache)
        run: |
          set -euo pipefail
          ./install/pr-downloader \
              --filesystem-writepath "$PWD/bar-data" \
              --download-game "Beyond All Reason test-29660-e79286c" \
              --download-map  "${{ matrix.map }}"

      - name: Run fightertest (${{ matrix.test }})
        run: |
          set -euo pipefail
          timeout 300s \
              ./install/spring-headless --isolation --write-dir "$PWD/bar-data" ${{ matrix.startscript }} \
              2>&1 | tee infolog.txt

      - name: Assert sync-hash file produced
        run: |
          set -euo pipefail

          hash_file="bar-data/fightertest_synchash.txt"
          if [ ! -s "$hash_file" ]; then
            echo "::error::$hash_file missing or empty — the fightertest did not produce checksum output"
            exit 1
          fi
          echo "Sync hash:"
          head -n 2 "$hash_file"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fightertest-${{ matrix.test }}-${{ needs.setup.outputs.sha }}
          path: |
            infolog.txt
            bar-data/*.log
            bar-data/fightertest_synchash.txt
          retention-days: 30
          if-no-files-found: ignore

  # Collects sync hashes from all fightertest runs, prints a history table,
  # and fails if hashes diverge from the merge-base commit (desync detection).
  collect-hashes:
    if: always()
    needs: [setup, fightertest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TESTED_SHA: ${{ needs.setup.outputs.sha }}
    steps:
      - name: Download current run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fightertest-*-${{ needs.setup.outputs.sha }}
          path: artifacts

      - name: Build combined hash manifest
        run: |
          set -euo pipefail
          for dir in artifacts/fightertest-*; do
            test_name=$(basename "$dir" | sed "s/^fightertest-//; s/-${TESTED_SHA}$//")
            hash_file="$dir/fightertest_synchash.txt"
            if [ -f "$hash_file" ]; then
              echo "$test_name $(head -n 1 "$hash_file")"
            else
              echo "$test_name MISSING"
            fi
          done | sort > synchashes.txt
          echo "Current hashes:"
          cat synchashes.txt

      - name: Upload combined hash manifest
        uses: actions/upload-artifact@v4
        with:
          name: fightertest-synchashes-${{ needs.setup.outputs.sha }}
          path: synchashes.txt
          retention-days: 90

      - name: Determine commits to look up
        id: history
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          base_branch="master"

          # Compare tested commit against base branch
          compare=$(gh api "repos/${repo}/compare/${base_branch}...${TESTED_SHA}" \
            --jq '{ahead: .ahead_by, merge_base: .merge_base_commit.sha, commits: [.commits[].sha]}')
          ahead=$(echo "$compare" | jq -r '.ahead')
          merge_base=$(echo "$compare" | jq -r '.merge_base')

          if [ "$ahead" -eq 0 ]; then
            echo "on_base=true" >> "$GITHUB_OUTPUT"
            # On master — collect last 10 commits (excluding current)
            gh api "repos/${repo}/commits?sha=${base_branch}&per_page=11" \
              --jq '.[].sha' | grep -v "^${TESTED_SHA}$" | head -10 > commits_to_check.txt
          else
            echo "on_base=false" >> "$GITHUB_OUTPUT"
            echo "merge_base=${merge_base}" >> "$GITHUB_OUTPUT"

            # 5 commits at and before the merge base (where the branch diverged)
            gh api "repos/${repo}/commits?sha=${merge_base}&per_page=5" \
              --jq '.[].sha' > commits_to_check.txt

            # Up to 10 branch commits (newest first, excluding current)
            echo "$compare" | jq -r '.commits | reverse | .[].sha' \
              | grep -v "^${TESTED_SHA}$" | head -10 >> commits_to_check.txt
          fi

          # Deduplicate while preserving order
          awk '!seen[$0]++' commits_to_check.txt > tmp && mv tmp commits_to_check.txt
          echo "Commits to look up ($(wc -l < commits_to_check.txt)):"
          cat commits_to_check.txt

      - name: Fetch historical hashes
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          mkdir -p history

          while read -r sha; do
            artifact_name="fightertest-synchashes-${sha}"
            artifact_id=$(gh api "repos/${repo}/actions/artifacts?name=${artifact_name}" \
              --jq '.artifacts[0].id // empty' 2>/dev/null || true)

            if [ -n "$artifact_id" ]; then
              if gh api "repos/${repo}/actions/artifacts/${artifact_id}/zip" \
                   > "history/${sha}.zip" 2>/dev/null; then
                unzip -qo "history/${sha}.zip" -d "history/${sha}" 2>/dev/null || true
                rm -f "history/${sha}.zip"
              fi
            fi
          done < commits_to_check.txt

          found=$(find history -name synchashes.txt | wc -l)
          echo "Found hashes for ${found} prior commit(s)"

      - name: Print hash history
        run: |
          set -euo pipefail
          tests=$(awk '{print $1}' synchashes.txt | tr '\n' ' ')

          # Build header
          header="| Commit |"
          separator="|--------|"
          for t in $tests; do
            header="$header $t |"
            separator="$separator------|"
          done

          {
            echo "## Fightertest sync hashes"
            echo ""
            echo "$header"
            echo "$separator"

            # Current commit row
            row="| ${TESTED_SHA:0:12} (current) |"
            for t in $tests; do
              h=$(awk -v t="$t" '$1==t {print $2}' synchashes.txt)
              row="$row \`${h:-MISSING}\` |"
            done
            echo "$row"

            # Historical rows
            while read -r sha; do
              manifest="history/${sha}/synchashes.txt"
              [ -f "$manifest" ] || continue
              row="| ${sha:0:12} |"
              for t in $tests; do
                h=$(awk -v t="$t" '$1==t {print $2}' "$manifest")
                row="$row \`${h:-?}\` |"
              done
              echo "$row"
            done < commits_to_check.txt

            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Compare against merge base
        if: steps.history.outputs.on_base == 'false'
        run: |
          set -euo pipefail
          merge_base="${{ steps.history.outputs.merge_base }}"
          base_manifest="history/${merge_base}/synchashes.txt"

          if [ ! -f "$base_manifest" ]; then
            echo "::warning::No fightertest hashes found for merge base ${merge_base:0:12} — cannot verify sync stability"
            exit 0
          fi

          echo "Comparing against merge base ${merge_base:0:12}..."
          diff_found=0
          while read -r test_name hash; do
            base_hash=$(awk -v t="$test_name" '$1==t {print $2}' "$base_manifest")
            if [ -z "$base_hash" ]; then
              echo "::warning::${test_name}: no base hash to compare"
            elif [ "$hash" = "MISSING" ]; then
              echo "::error::${test_name}: hash MISSING in current run"
              diff_found=1
            elif [ "$hash" != "$base_hash" ]; then
              echo "::error::${test_name}: DESYNC — current ${hash} != base ${base_hash}"
              diff_found=1
            else
              echo "${test_name}: OK (${hash})"
            fi
          done < synchashes.txt

          if [ "$diff_found" -ne 0 ]; then
            echo "::error::Sync hash mismatch detected — this commit changes deterministic behavior relative to merge base ${merge_base:0:12}"
            exit 1
          fi
          echo "All hashes match merge base."
