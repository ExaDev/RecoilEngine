name: Claude Issue Triage
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && contains(github.event.comment.body, '/claude-triage'))
    concurrency:
      group: issue-triage-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code for Issue Triage
        timeout-minutes: 5
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_BRUNO_D }}
          claude_args: |
            --model claude-sonnet-4-6
          # Inspiration for this prompt was taken from https://github.com/anthropics/claude-code-action/blob/main/.claude/commands/label-issue.md
          prompt: |
            You're an issue triage assistant. Analyze the issue and add labels.

            IMPORTANT: Don't post any comments or messages to the issue. Your only actions are adding labels.

            Context:

            ISSUE_NUMBER: ${{ github.event.issue.number }}

            TOOLS:
            - github cli `gh` - the min way you'll interact with issues
              - `gh label list --limit 100` — fetch with limit
              - `gh issue view 123` — read issue title, body, and labels
              - `gh issue view 123 --comments` — read the conversation
              - `gh issue edit 123 --add-label {label}` - add label to issue

            TASK:

            1. Run `gh label list` to fetch the available labels. You may ONLY use labels from this list. Never invent new labels.
            2. Run `gh issue view ISSUE_NUMBER` to read the issue details.
            3. Run `gh issue view ISSUE_NUMBER --comments` to read the conversation.

            4. Analyze and decide on which category labels are applicable:
              - Type (bug, enhancement, refactor, question, etc.)
              - Technical areas (Lua API, Graphics, Pathfinding, etc.)
              - Platform (arm64, amd64, etc.)

            7. Apply all selected labels:
              `gh issue edit ISSUE_NUMBER --add-label LABEL1 --add-label LABEL2 ...`
            
            GUIDELINES:
            - ONLY use labels from `gh label list` — never create or guess label names
            - DO NOT post any comments to the issue
            - When in doubt, don't apply a label — false positives are worse than missing labels
            - It's okay to not add any labels if none are clearly applicable
