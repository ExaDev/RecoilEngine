# Runs the Beyond All Reason "synctest" (/luarules synctest) against an engine
# commit on all supported platforms (amd64-linux, arm64-linux, amd64-windows).
#
# This workflow looks up the most recent successful "Build Engine v2" run for 
# the target commit and downloads platform-specific artifacts. If no such run 
# exists, the workflow fails fast.
# TODO: trigger after every engine build
#
# The cross-platform-check job compares hashes across architectures and is
# intended as a merge-blocking required check.
#
# See test/synctest/README.md for background and how to run locally.
name: Sync test

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Engine commit SHA to test. Leave blank to test the head of the ref selected in the picker above.'
        type: string
        default: ''

permissions:
  # actions:read is required to list workflow runs and download artifacts
  # produced by a different workflow run (the Build Engine v2 run for the
  # target commit).
  actions: read
  contents: read

env:
  MAP: "Jade Empress 1.3"
  GAME: "Beyond All Reason test-30212-63c6ded"
  HASH_FILE: "synctest_synchash.json"

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      run_id: ${{ steps.engine-run.outputs.run_id }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve target commit
        id: resolve
        run: |
          set -euo pipefail
          target="${{ inputs.commit }}"
          if [ -z "$target" ]; then target="${{ github.sha }}"; fi

          # Normalize whatever the user pasted (full sha, short sha, branch, tag)
          # into a full 40-char SHA so the run lookup below is unambiguous.
          full_sha=$(gh api "repos/${{ github.repository }}/commits/$target" --jq '.sha')
          echo "Resolved target commit: $full_sha"
          echo "sha=$full_sha" >> "$GITHUB_OUTPUT"

      - name: Find Build Engine v2 run for this commit
        id: engine-run
        run: |
          set -euo pipefail
          run_id=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/engine-build.yml/runs?head_sha=${{ steps.resolve.outputs.sha }}&status=success" \
            --jq '.workflow_runs[0].id')
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "::error::No successful 'Build Engine v2' run found for commit ${{ steps.resolve.outputs.sha }}."
            echo "::error::Trigger Build Engine v2 on that commit first (push it, or dispatch engine-build.yml manually) and retry."
            exit 1
          fi
          echo "Using engine-build run $run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

  synctest:
    needs: setup
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64-linux
          - arm64-linux
          - amd64-windows
        include:
          - platform: amd64-linux
            runs-on: ubuntu-latest
            bin-suffix: ""
          - platform: arm64-linux
            runs-on: ubuntu-24.04-arm
            bin-suffix: ""
          - platform: amd64-windows
            runs-on: windows-latest
            bin-suffix: ".exe"
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout workflow definition and test inputs
        # Uses the ref picked in the dispatch UI (github.sha), NOT the target
        # commit — so the startscript and any other test assets come from the
        # workflow-definition ref. The target commit only controls which engine
        # artifact gets downloaded below.
        uses: actions/checkout@v4

      - name: Download engine artifact (${{ matrix.platform }})
        uses: actions/download-artifact@v4
        with:
          pattern: engine-artifacts-${{ matrix.platform }}*
          run-id: ${{ needs.setup.outputs.run_id }}
          github-token: ${{ github.token }}
          path: engine-artifact
          merge-multiple: true

      - name: Extract install tree
        run: |
          set -euo pipefail
          mkdir -p install

          # Engine is packaged with INSTALL_PORTABLE=ON (CMake default, see
          # CMakeLists.txt:22), so binaries live at the install-tree root:
          #   install/spring-headless, install/pr-downloader, install/spring, ...
          # engine-build also uploads a -dbgsym.tar.zst alongside the 7z; the
          # glob below intentionally matches only the .7z.
          7z x engine-artifact/recoil_*_${{ matrix.platform }}*.7z -oinstall

      - name: Restore bar-data cache
        uses: actions/cache@v4
        with:
          path: bar-data
          # IMPORTANT:
          # Bump this key in lockstep with any change to the pinned
          # gametype/mapname. See test/synctest/README.md.
          key: bar-data-${{ env.GAME }}-${{ env.MAP }}

      - name: Fetch pinned BAR assets (no-op on warm cache)
        run: |
          set -euo pipefail
          ./install/pr-downloader${{ matrix.bin-suffix }} \
              --filesystem-writepath "$PWD/bar-data" \
              --download-game "${{ env.GAME }}" \
              --download-map  "${{ env.MAP }}"

      - name: Substitute $VERSION in startscript
        run: |
          set -euo pipefail
          # Replace the literal "$VERSION" placeholder in gametype= with the
          # version suffix of the pinned GAME (everything after the last space,
          # e.g. "test-29932-21b3bb0").
          game="${{ env.GAME }}"
          version="${game##* }" # extract just the test-29932-21b3bb0 part
          sed -i "s/\$VERSION/${version}/g" test/synctest/synctest-startscript.txt
          grep -n 'gametype=' test/synctest/synctest-startscript.txt

      - name: Run synctest
        run: |
          set -euo pipefail
          ./install/spring-headless${{ matrix.bin-suffix }} --isolation --write-dir "$PWD/bar-data" test/synctest/synctest-startscript.txt \
              2>&1 | tee infolog.txt

      - name: Assert sync-hash file produced
        run: |
          set -euo pipefail

          hash_file="bar-data/${{ env.HASH_FILE }}"
          if [ ! -s "$hash_file" ]; then
            echo "::error::$hash_file missing or empty — the synctest did not produce checksum output"
            exit 1
          fi
          digest=$(jq -r .digest "$hash_file")
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::$hash_file has no .digest field"
            exit 1
          fi
          echo "Sync hash digest: $digest"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synctest-${{ matrix.platform }}-${{ needs.setup.outputs.sha }}
          path: |
            infolog.txt
            bar-data/*.log
            bar-data/${{ env.HASH_FILE }}
          retention-days: 30
          if-no-files-found: ignore

  # Collects sync hashes from all synctest runs across platforms and fails if
  # hashes diverge between architectures (cross-platform desync detection).
  # This job is intended to be a required/merge-blocking status check.
  cross-platform-check:
    if: always()
    needs: [setup, synctest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TESTED_SHA: ${{ needs.setup.outputs.sha }}
    steps:
      - name: Download current run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: synctest-*-${{ needs.setup.outputs.sha }}
          path: artifacts

      - name: Build combined hash manifest
        run: |
          set -euo pipefail
          for dir in artifacts/synctest-*; do
            # dir name format: synctest-{platform}-{sha}
            platform=$(basename "$dir" | sed "s/^synctest-//; s/-${TESTED_SHA}$//")
            hash_file="$dir/${{ env.HASH_FILE }}"
            if [ -f "$hash_file" ]; then
              digest=$(jq -r .digest "$hash_file")
              echo "$platform ${digest:-MISSING}"
            else
              echo "$platform MISSING"
            fi
          done | sort > synchashes.txt
          echo "Current hashes:"
          cat synchashes.txt

      - name: Cross-platform hash comparison
        run: |
          set -euo pipefail
          echo "Cross-platform determinism check:"
          unique_hashes=$(awk '$2!="MISSING" {print $2}' synchashes.txt | sort -u | wc -l)
          missing=$(awk '$2=="MISSING"' synchashes.txt | wc -l)
          if [ "$unique_hashes" -eq 0 ]; then
            echo "::error::no hashes produced on any platform"
            exit 1
          elif [ "$missing" -gt 0 ]; then
            echo "::error::hash MISSING on at least one platform"
            awk '{print "  " $1 ": " $2}' synchashes.txt
            exit 1
          elif [ "$unique_hashes" -gt 1 ]; then
            echo "::error::CROSS-PLATFORM DESYNC — hashes differ across architectures:"
            awk '{print "  " $1 ": " $2}' synchashes.txt
            echo "::error::Cross-platform sync failure — the engine is not deterministic across architectures"
            exit 1
          fi
          hash=$(awk 'NR==1 {print $2}' synchashes.txt)
          echo "OK across all platforms ($hash)"

